<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site en maintenance — HandiPro31</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      background-color: #E8F7F3;
      color: #2D2D2D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 560px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
    }

    .logo {
      display: block;
      margin: 0 auto 2rem;
      max-width: 180px;
      height: auto;
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      background-color: #E8F7F3;
      border-radius: 50%;
      margin-bottom: 1.5rem;
    }

    .icon svg {
      width: 2rem;
      height: 2rem;
      fill: none;
      stroke: #4BA78C;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #2C3E50;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      color: #717171;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 3rem;
      height: 3px;
      background: #4BA78C;
      border-radius: 2px;
      margin: 0 auto 1.5rem;
    }

    .contact-link {
      display: inline-block;
      background: #4BA78C;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.75rem 2rem;
      border-radius: 2rem;
      transition: background 0.2s;
    }

    .contact-link:hover,
    .contact-link:focus-visible {
      background: #3A8A72;
      outline: 3px solid #4BA78C;
      outline-offset: 3px;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #717171;
    }
  </style>
</head>
<body>

  <div class="card" role="main">

    <img src="assets/images/LogoHandipro31.png" alt="Logo HandiPro31" class="logo" />

    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 5v5l3 3" />
      </svg>
    </div>

    <h1>Site en maintenance</h1>
    <div class="divider"></div>

    <p>
      Nous effectuons une maintenance pour améliorer vos services.<br />
      Le site sera de nouveau disponible très prochainement.
    </p>

    <p>Pour toute urgence, contactez-nous :</p>

    <a href="tel:+33534409191" class="contact-link">05 34 40 91 91</a>

  </div>

  <footer>
    <p>&copy; 2026 HandiPro31 — Tous droits réservés</p>
  </footer>

</body>
</html>
